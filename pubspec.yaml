name: iotani_berhasil
description: "IoTani - An IoT-based early warning system for plant disease risk in urban farming."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.1.0

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  firebase_database: ^10.3.0
  firebase_messaging: ^14.7.0

  # Routing
  go_router: ^12.1.0

  # UI/UX
  google_fonts: ^6.1.0
  intl: ^0.19.0
  
  # Utilities
  uuid: ^4.0.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_generator: ^2.3.0
  build_runner: ^2.4.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
